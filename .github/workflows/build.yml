# Builds NAICS Snap Desktop for macOS (universal) and Windows on every tag
# push matching v*. Output artifacts are attached to a draft GitHub Release
# for the maintainer to review and publish.
#
# The Windows job runs on `windows-latest`, which has WebView2 preinstalled
# and MSVC build tools — so a Mac-only developer can ship Windows MSI/NSIS
# installers without owning a Windows machine.
#
# Trigger:  git tag v1.0.0 && git push --tags
# Or:       Actions → build → Run workflow (manual)

name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install frontend deps
        run: npm ci

      - name: build with tauri
        uses: tauri-apps/tauri-action@v0
        env:
          # Required: lets tauri-action create / update the GitHub Release
          # and upload artifacts. Without this the build succeeds but the
          # final upload step fails with "GITHUB_TOKEN is required".
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #
          # --- Code signing (commented out) ----------------------------
          # Empty signing env vars cause Tauri to ATTEMPT signing with an
          # empty identity, which then fails ("item not found in keychain").
          # We leave these commented until real certs are available. To
          # enable: uncomment and add the matching repo secrets under
          # Settings → Secrets and variables → Actions.
          #
          # macOS:
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #
          # Windows code signing (uses tauri-conf.json's bundle.windows
          # certificateThumbprint by default; the env vars below are for
          # tauri's optional .sig signing key for updater bundles):
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'NAICS Snap ${{ github.ref_name }}'
          releaseDraft: true

  # Frontend + Rust sanity check on every PR, so problems are caught before
  # tagging a release. Doesn't produce installers — just compiles.
  check:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Linux needs the webkit/gtk deps that Tauri links against.
      - name: install linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: install frontend deps
        run: npm ci
      - name: typecheck + vite build
        run: npm run build
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --lib
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib
